{% extends "base.html" %}

{% block title %}Register - EventTix{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="glass-card p-5 animate-fade-in text-light">
                <div class="text-center mb-4">
                    <div class="bg-primary rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 60px; height: 60px;">
                        <i class="fa-solid fa-user-plus text-white fs-3"></i>
                    </div>
                    <h3 class="fw-bold">Create an Account</h3>
                    <p class="text-muted">Join us to book tickets to amazing events</p>
                </div>
                
                <form method="POST" action="{{ url_for('register') }}">
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="username" name="username" placeholder="Username" required>
                        <label for="username" class="text-muted">Username</label>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="email" class="form-control" id="email" name="email" placeholder="name@example.com" required>
                        <label for="email" class="text-muted">Email address</label>
                    </div>
                    <div class="form-floating mb-4">
                        <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
                        <label for="password" class="text-muted">Password</label>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-3 rounded-pill fw-bold mb-3">
                        Register <i class="fa-solid fa-check ms-2"></i>
                    </button>
                    <div class="text-center">
                        <p class="text-muted mb-0">Already have an account? <a href="{{ url_for('login') }}" class="text-primary text-decoration-none">Sign in</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
